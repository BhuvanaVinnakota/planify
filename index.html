<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planify — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- Animated Background -->
  <div class="login-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
    <div class="shape shape-circle shape-1"></div>
    <div class="shape shape-circle shape-2"></div>
    <div class="shape shape-circle shape-3"></div>
    <div class="shape shape-circle shape-4"></div>
  </div>

  <!-- Twinkling Stars -->
  <div class="stars" id="stars"></div>

  <!-- Login Card -->
  <div class="login-wrapper">
    <div class="login-card">

      <!-- Card Header -->
      <div class="card-header">
        <div class="header-logo">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"
                  stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="9" y="3" width="6" height="4" rx="1"
                  stroke="white" stroke-width="2"/>
            <path d="M9 12l2 2 4-4"
                  stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1>Welcome to Planify</h1>
        <p>Your personal productivity command center</p>
      </div>

      <!-- Feature Pills -->
      <div class="feature-strip">
        <div class="feature-pill">
          <div class="pill-icon">✓</div>
          <span class="pill-label">Tasks</span>
        </div>
        <div class="feature-pill">
          <div class="pill-icon">📊</div>
          <span class="pill-label">Track</span>
        </div>
        <div class="feature-pill">
          <div class="pill-icon">📌</div>
          <span class="pill-label">Notes</span>
        </div>
      </div>

      <!-- Tab Switcher -->
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Card Body -->
      <div class="card-body">

        <div class="error-msg" id="login-error"></div>
        <div class="error-msg" id="reg-error"></div>

        <!-- Login Form -->
        <form class="login-form active" id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrap">
              <i class="fas fa-envelope input-icon"></i>
              <input type="email" id="login-email" class="form-input"
                     placeholder="you@example.com" required>
            </div>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" id="login-password" class="form-input"
                     placeholder="••••••••" required>
            </div>
          </div>
          <button type="submit" class="btn-submit">
            <i class="fas fa-arrow-right-to-bracket"></i> &nbsp;Sign In to Planify
          </button>
        </form>

        <!-- Register Form -->
        <form class="register-form" id="register-form" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label>Full Name</label>
            <div class="input-wrap">
              <i class="fas fa-user input-icon"></i>
              <input type="text" id="reg-name" class="form-input"
                     placeholder="Your name" required>
            </div>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrap">
              <i class="fas fa-envelope input-icon"></i>
              <input type="email" id="reg-email" class="form-input"
                     placeholder="you@example.com" required>
            </div>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" id="reg-password" class="form-input"
                     placeholder="Create a password" required>
            </div>
          </div>
          <button type="submit" class="btn-submit">
            <i class="fas fa-user-plus"></i> &nbsp;Create Account
          </button>
        </form>

      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    function createStars() {
      const container = document.getElementById('stars');
      for (let i = 0; i < 60; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left             = Math.random() * 100 + '%';
        star.style.top              = Math.random() * 100 + '%';
        star.style.animationDelay    = (Math.random() * 4) + 's';
        star.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
        container.appendChild(star);
      }
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.login-form, .register-form').forEach(f => f.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById(tab + '-form').classList.add('active');
      document.getElementById('login-error').style.display = 'none';
      document.getElementById('reg-error').style.display   = 'none';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const data     = await api('POST', '/api/login', { email, password });
      if (data.error) {
        const el = document.getElementById('login-error');
        el.textContent    = data.error;
        el.style.display  = 'block';
      } else {
        window.location.href = '/dashboard';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const name     = document.getElementById('reg-name').value;
      const email    = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const data     = await api('POST', '/api/register', { name, email, password });
      if (data.error) {
        const el = document.getElementById('reg-error');
        el.textContent   = data.error;
        el.style.display = 'block';
      } else {
        const login = await api('POST', '/api/login', { email, password });
        if (login.success) window.location.href = '/dashboard';
      }
    }

    window.onload = createStars;
  </script>
</body>
</html>
